<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Ramsey & Tiffany's Wedding">
    <meta property="og:description" content="Wedding Details and RSVP!">
    <meta property="og:image" content="wedding/preview.png">
    <meta property="og:url" content="www.jan-09-2027.com/ourstory.html">
    <meta property="og:type" content="website">
    <link rel='icon' href='wedding/favicon.png' type='image/x-icon'>
	<title>Our Story: Ramsey & Tiffany's</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}


#cva {
	position: relative;
    width: 100%;
	height: 100vh;
	overflow: hidden;
	background: #faf1e1;
}
#cva::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 70px;       
    background: #faf1e1;
}
#cvaiframe {
   display: block;
	margin: auto;
	width: 60%; 
	height: 100%; 
	border: none; 
	padding: 0;
}

@media (max-width: 768px) {
	#cva::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 70px;       
    background: #faf1e1;
	}
    #cvaiframe {
        width: 100%;
    }

}


/* Tablets */
@media (min-width: 768px) and (max-width: 1023px) {
	#cva::after {
		content: "";
		position: absolute;
		left: 0;
		right: 0;
		bottom: 0;
		height: 100px;       
		background: #faf1e1;
	}
    #cvaiframe {
        width: 100%;
    }
}

</style>

</head>
<body onload="setSite()">

<div id="cva">
  <iframe id="cvaiframe" loading="eager" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
</div>

<script>

function isMobile() {
    return window.matchMedia("(max-width: 768px)").matches;
}

function setSite() {
    var sites = ['https://www.canva.com/design/DAHPIC_7xuQ/o_zqSrIxdytRUftk1fNrZg/view?embed',  // desktop
                 'https://www.canva.com/design/DAHPIC_7xuQ/o_zqSrIxdytRUftk1fNrZg/view?embed']  // mobile
    
	
	if (!isMobile())
    {
	  document.getElementById('cvaiframe').src = sites[0];
	  console.log("hi, mom!");
	}
	else 
	{
	  document.getElementById('cvaiframe').src = sites[0];
	  console.log("hi, mom's phone!");
	}
	
	
}


</script>

</body>
</html>
