<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}

.pdf-wrapper {
	background: #faf1e1;
    position: relative;
    width: 60%;
    margin: auto;
    display: block;
}

.pdf-border-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 40px solid #faf1e1;
    pointer-events: none; /* Allows users to still click/scroll the PDF inside */
}

/* iframe becomes your "document block" */
#pdf {
    width: 100%;
	border: none;
    display: block;
	margin: auto;
	overflow: hidden;
}
</style>
</head>

<body>

<div style="background: #faf1e1">
<div class="pdf-wrapper">
<iframe
    id="pdf"
    src="/pdfjs/web/viewer.html?file=/layout.pdf#zoom=page-width"
	scrolling="no">
</iframe>
<div class="pdf-border-overlay"></div>
</div>
</div>

<div style="background: #faf1e1; height: 750px;">
<iframe id="rsvp" style="display:block;width:50%;height:75%;border:none;overflow:hidden;margin:auto;"
          src="https://ramsey-and-tiffany.anrsvp.com/?embed=true">
  </iframe>
</div>

<script src="embed-pdf.js"></script>

</body>
</html>
