<head>
	<meta charset="UTF-8">

	<title>Ramsey & Tiffany's Wedding</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}


/* iframe becomes your "document block" */
#cva {
	position: relative;
    width: 100%;
	aspect-ratio: 0.438;
	overflow: hidden;
	background: #faf1e1;
}
#cva::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    aspect-ratio: 100;       /* n pixels */
    background: #faf1e1;
    pointer-events: none;
}
#cvaframe {
   display: block;
	margin: auto;
	width: 60%; 
	height: 100%; 
	border: none; 
	padding: 0;
}
</style>
</head>
<body>

<div id="cva">
  <iframe id="cvaframe" loading="eager" src="https://www.canva.com/design/DAHGmyEsC0o/ChtlDqFoOb5fIiZzEOgOYw/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
</div>

<div style="background: #faf1e1; height: 750px;">
<iframe id="rsvp" style="display:block;width:50%;height:75%;border:none;overflow:hidden;margin:auto;"
          src="https://ramsey-and-tiffany.anrsvp.com/?embed=true">
  </iframe>
</div>

</body>
</html>
