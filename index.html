<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Ramsey & Tiffany's Wedding">
    <meta property="og:description" content="Wedding Details and RSVP!">
    <meta property="og:image" content="wedding/preview.png">
    <meta property="og:url" content="www.jan-09-2027.com">
    <meta property="og:type" content="website">
    <link rel='icon' href='wedding/favicon.png' type='image/x-icon'>
	<title>Ramsey & Tiffany's Wedding</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
}


#cva {
	position: relative;
    width: 100%;
	aspect-ratio: 0.2858;
	overflow: hidden;
	background: #faf1e1;
}
#cva::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    aspect-ratio: 100;       
    background: #faf1e1;
    pointer-events: none;
}
#cvaiframe {
   display: block;
	margin: auto;
	width: 60%; 
	height: 100%; 
	border: none; 
	padding: 0;
}
#rsvp {
	display:block;
	width:50%;
	height:75%;
	border:none;
	overflow:hidden;
	margin:auto;
}

@media (max-width: 768px) {
	#cva {
		aspect-ratio: 0.171;
	}
	#cva::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 10px;       
    background: #faf1e1;
    pointer-events: none;
	}
    #cvaiframe {
        width: 100%;
    }
	#rsvp {
		width: 100%;
	}
}
</style>

</head>
<body onload="setSite()">

<div id="cva">
  <iframe id="cvaiframe" loading="eager" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
</div>

<div style="background: #faf1e1; height: 750px;">
<iframe id="rsvp" src="https://ramsey-and-tiffany.anrsvp.com/?embed=true"></iframe>
</div>

<script>

function isMobile() {
    return window.matchMedia("(max-width: 768px)").matches;
}

function setSite() {
    var sites = ['https://www.canva.com/design/DAHGmyEsC0o/ChtlDqFoOb5fIiZzEOgOYw/view?embed',  // desktop
                 'https://www.canva.com/design/DAHLxQOtovs/WN6HHf0i7faHB7VkK76DrQ/view?embed']  // mobile
    
	
	if (!isMobile())
    {
	  document.getElementById('cvaiframe').src = sites[0];
	  console.log("hi, mom!");
	}
	else 
	{
	  document.getElementById('cvaiframe').src = sites[0];
	  console.log("hi, mom's phone!");
	}
	
	
}


</script>

</body>
</html>
